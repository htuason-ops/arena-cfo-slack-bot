<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Arena — Meet Your CFO (flyer)</title>
<style>
  html, body { margin:0; padding:0; background:#EAF1F8; font-family:"Montserrat","Helvetica Neue",Arial,sans-serif; }

  /* Self-hosted-friendly: swap this @font-face for a licensed/self-hosted
     Montserrat in production. Google Fonts is used here for portability. */
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');

  .arena-flyer {
    width:1080px;
    min-height:1440px;
    background:#EAF1F8;
    position:relative;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  /* Header */
  .hdr { padding:52px 64px 0; display:flex; align-items:center; justify-content:space-between; gap:24px; }
  .hdr img { height:64px; width:auto; display:block; }
  .hdr-text { text-align:right; }
  .hdr-text .line1 { font-size:36px; font-weight:500; color:#1C5BB9; line-height:1; margin-bottom:4px; }
  .hdr-text .line2 { font-size:66px; font-weight:700; color:#1C5BB9; line-height:1; letter-spacing:-0.01em; }

  /* Middle: photo + quote/name */
  .mid { display:flex; align-items:flex-end; margin-top:20px; }
  .photo {
    width:520px; height:620px; flex:none;
    background-color:#EAF1F8; background-size:cover; background-position:left bottom; background-repeat:no-repeat;
  }
  .right-col { flex:1; min-height:620px; display:flex; flex-direction:column; padding:8px 64px 0 44px; box-sizing:border-box; }
  .quote-wrap { flex:1; display:flex; flex-direction:column; justify-content:center; }
  .quote-rel { position:relative; }
  .quote-open { position:absolute; left:2px; top:-52px; font-size:64px; font-weight:800; color:#FF7F60; line-height:1; }
  .quote-text { margin:0; padding:14px 44px 0; text-align:center; font-size:27px; font-weight:500; line-height:1.45; color:#151F32; }
  .quote-close { font-size:64px; font-weight:800; color:#FF7F60; line-height:0; position:relative; top:34px; left:12px; }
  .name-block { margin-top:auto; }
  .name-text { text-align:right; font-size:54px; font-weight:800; color:#1D1A59; line-height:1.05; letter-spacing:-0.01em; }
  .divider { height:2px; background:#FF7F60; margin:20px 0 16px; }
  .email-text { text-align:center; font-size:24px; font-weight:700; color:#1D1A59; }

  /* Three columns */
  .cols { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0 40px; padding:56px 64px 0; flex:1; }
  .col-edu { padding-right:12px; }
  .col-exp { border-left:2px solid #FF7F60; padding-left:40px; }
  .col-head { font-size:21px; font-weight:700; color:#1C5BB9; letter-spacing:0.03em; text-transform:uppercase; margin-bottom:24px; }
  .col ul { list-style:none; margin:0; padding:0; }
  .col li { display:flex; gap:12px; align-items:flex-start; margin-bottom:18px; }
  .col li .bullet { color:#FF7F60; font-size:20px; line-height:1.15; flex:none; }
  .col li .item { font-size:19px; color:#20293A; line-height:1.32; }

  /* Footer */
  .ftr { padding:32px 64px 60px; }
  .ftr span { font-size:30px; font-weight:700; color:#FF7F60; }
</style>
</head>
<body>

<div class="arena-flyer" id="flyer">

  <div class="hdr">
    <!-- Swap for the real arena-wordmark-navy.png asset before deploying -->
    <img id="wordmark" src="./arena-wordmark-navy.png" alt="Arena" onerror="this.style.display='none'" />
    <div class="hdr-text">
      <div class="line1">Meet Your</div>
      <div class="line2">CFO</div>
    </div>
  </div>

  <div class="mid">
    <div class="photo" id="photo"></div>
    <div class="right-col">
      <div class="quote-wrap">
        <div class="quote-rel">
          <span class="quote-open">&ldquo;</span>
          <p class="quote-text" id="quote">Vision, creativity, high expectations, and an unending willingness to help clients grow.<span class="quote-close">&rdquo;</span></p>
        </div>
      </div>
      <div class="name-block">
        <div class="name-text" id="name">Jane Doe</div>
        <div class="divider"></div>
        <div class="email-text" id="email">jane@arenacfo.com</div>
      </div>
    </div>
  </div>

  <div class="cols">
    <div class="col col-edu">
      <div class="col-head">Education</div>
      <ul id="education"></ul>
    </div>
    <div class="col col-exp">
      <div class="col-head">Expertise</div>
      <ul id="expertise"></ul>
    </div>
    <div class="col col-field" style="padding-left:4px;">
      <div class="col-head">Field</div>
      <ul id="field"></ul>
    </div>
  </div>

  <div class="ftr"><span>arenacfo.com</span></div>
</div>

<script>
  // Renders a bullet list into a <ul>, matching the flyer's design tokens.
  function renderList(ulId, items) {
    var ul = document.getElementById(ulId);
    ul.innerHTML = "";
    (items || []).forEach(function (text) {
      var li = document.createElement("li");
      var bullet = document.createElement("span");
      bullet.className = "bullet";
      bullet.innerHTML = "&bull;";
      var item = document.createElement("span");
      item.className = "item";
      item.textContent = text;
      li.appendChild(bullet);
      li.appendChild(item);
      ul.appendChild(li);
    });
  }

  // Headless hook: Puppeteer calls window.__arenaSetProfile({name, email,
  // quote, photo (data URL), education[], expertise[], field[]}) then waits
  // briefly for the photo to paint before screenshotting #flyer.
  window.__arenaSetProfile = function (d) {
    d = d || {};
    document.getElementById("name").textContent = d.name || "";
    document.getElementById("email").textContent = d.email || "";
    document.getElementById("quote").firstChild.textContent = d.quote || "";
    renderList("education", d.education);
    renderList("expertise", d.expertise);
    renderList("field", d.field);
    if (d.photo) {
      document.getElementById("photo").style.backgroundImage = "url('" + d.photo + "')";
    }
  };
</script>

</body>
</html>
